tokenizer:
  path: /home/derek/external/artifacts/tokenizer32K/tokenizer

data:
  # Paths created by Dataset.save_to_disk(...)
  train_path: /home/derek/external/artifacts/train_dataset
  eval_path: /home/derek/external/artifacts/val_dataset

  # Leave these null when each path contains a single Dataset.
  # Set to train/validation when loading a saved DatasetDict.
  train_split: null
  eval_split: null

model:
  # Omit vocab_size to derive it from len(tokenizer).
  hidden_size: 1024
  intermediate_size: 4096
  num_hidden_layers: 20
  num_attention_heads: 16
  num_key_value_heads: 4

  # Context Length, must be set equal to packed dataset setting
  max_position_embeddings: 4096

  hidden_act: silu
  rms_norm_eps: 1.0e-5
  rope_theta: 10000.0

  attention_bias: false
  attention_dropout: 0.0
  mlp_bias: false

  tie_word_embeddings: true
  initializer_range: 0.02
  use_cache: false

training:
  output_dir: /home/derek/external/artifacts/model-300m/pretraining
  logging_dir: /home/derek/external/artifacts/model-300m/pretraining/tensorboard-logs

  # Trainer will iterate over the dataset this many times.
  num_train_epochs: 2

  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 16

  learning_rate: 3.0e-4
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0

  # Current Transformers supports a cosine schedule with a nonzero floor.
  lr_scheduler_type: cosine_with_min_lr
  lr_scheduler_kwargs:
    min_lr_rate: 0.1
  warmup_steps: 10

  # Prefer bf16 on Ampere-or-newer GPUs.
  bf16: true
  fp16: false
  tf32: true

  # Useful if the model is near the GPU's memory limit.
  gradient_checkpointing: true

  optim: adamw_torch_fused

  eval_strategy: steps
  eval_steps: 2000

  save_strategy: steps
  save_steps: 100
  save_total_limit: 10

  logging_strategy: steps
  logging_steps: 10
  logging_first_step: true

  dataloader_num_workers: 4
  dataloader_pin_memory: true
  dataloader_drop_last: true

  # Avoid Trainer deleting input_ids because of signature inspection.
  remove_unused_columns: false

  # Avoid retaining enormous vocabulary logits during evaluation.
  prediction_loss_only: true

  report_to:
    - tensorboard

  seed: 1337
  data_seed: 1337
